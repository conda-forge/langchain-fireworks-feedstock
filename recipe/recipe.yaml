schema_version: 1

context:
  name: langchain-fireworks
  version: 1.2.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_fireworks-${{ version }}.tar.gz
  sha256: de93807bd5984a791ee4a22aa98067f655c17ec62d3a86a7e30a1f219da239ae

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - langchain-core >=1.2.21,<2.0.0
    - fireworks-ai >=0.13.0,<1.0.0
    - openai >=2.0.0,<3.0.0
    - requests >=2.0.0,<3.0.0
    - aiohttp >=3.9.1,<4.0.0

tests:
  - python:
      imports:
        - langchain_fireworks
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: An integration package connecting Fireworks and LangChain
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/langchain-ai/langchain

extra:
  recipe-maintainers:
    - jan-janssen
